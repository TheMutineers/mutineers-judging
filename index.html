<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mutineers Photo Judging</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    /* Full-screen container */
    #app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 6px;
        box-sizing: border-box;
    }

    /* Title */
    h1 {
        margin: 0 0 4px 0;
        font-size: 2.1em;
        color: #990000;
        font-weight: bold;
    }

    /* Submit button (smaller height) */
    #submitButton {
        background: #990000;
        color: white;
        border: none;
        width: 100%;
        height: 7vh;        /* smaller */
        font-size: 1.5em;
        border-radius: 10px;
    }

    /* Voting area */
    #voting {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-top: 4px;
    }

    /* Top bar (smaller height) */
    #topBar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
    }

    .infoBox {
        border: 2px solid #999;
        border-radius: 8px;
        width: 48%;
        height: 5.5vh;      /* smaller */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3em;
        font-weight: bold;
    }

    #imageNumber { color: #008000; }
    #scoreDisplay { color: #cc5500; }

    /* Keypad grid — REAL shrink by reducing allowed height */
    #keypad {
        height: 48vh;       /* FIXED smaller height */
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 4px;
        margin-bottom: 4px;
    }

    .keyBtn {
        font-size: 1.5em;   /* smaller */
        border-radius: 10px;
        background: #e0e0e0;
        border: 2px solid #999;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Navigation buttons — smaller height */
    #navRow {
        display: flex;
        justify-content: space-between;
        gap: 4px;
        height: 7vh;        /* smaller */
    }

    .navBtn {
        width: 50%;
        font-size: 1.5em;
        border-radius: 10px;
        background: #d0d0d0;
        border: 2px solid #777;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Summary screen */
    #summary {
        display: none;
        height: 100vh;
        overflow: auto;
        padding: 10px;
        box-sizing: border-box;
    }

    table {
        border-collapse: collapse;
        margin: 10px auto;
        width: 80%;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px 10px;
    }
</style>
</head>

<body>
<div id="app">

    <h1>Mutineers Photo Judging</h1>

    <button id="submitButton" onclick="submitVotes()">Submit</button>

    <div id="voting">

        <div id="topBar">
            <div class="infoBox" id="imageNumber">Image 1</div>
            <div class="infoBox" id="scoreDisplay">Score –</div>
        </div>

        <div id="keypad">
            <button class="keyBtn" onclick="pressNum(1)">1</button>
            <button class="keyBtn" onclick="pressNum(2)">2</button>
            <button class="keyBtn" onclick="pressNum(3)">3</button>

            <button class="keyBtn" onclick="pressNum(4)">4</button>
            <button class="keyBtn" onclick="pressNum(5)">5</button>
            <button class="keyBtn" onclick="pressNum(6)">6</button>

            <button class="keyBtn" onclick="pressNum(7)">7</button>
            <button class="keyBtn" onclick="pressNum(8)">8</button>
            <button class="keyBtn" onclick="pressNum(9)">9</button>

            <button class="keyBtn" onclick="pressNum(0)">0</button>
            <button class="keyBtn" onclick="clearScore()">Clear</button>
        </div>

        <div id="navRow">
            <button class="navBtn" onclick="goBack()">Back</button>
            <button class="navBtn" onclick="saveAndNext()">Next</button>
        </div>

    </div>

</div>

<div id="summary">
    <h2>Competition Submitted</h2>
    <p>Your scores are saved on this device.</p>

    <table id="summaryTable">
        <thead>
            <tr><th>Image</th><th>Score</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let totalImages = 60;
    let currentImage = 1;
    let scores = new Array(totalImages).fill(null);

    function updateTopBar() {
        document.getElementById('imageNumber').textContent = "Image " + currentImage;
        const s = scores[currentImage - 1];
        document.getElementById('scoreDisplay').textContent = "Score " + (s === null ? "–" : s);
    }

    function pressNum(n) {
        let current = scores[currentImage - 1];
        if (current === null) current = "";

        if (current.length >= 2) return;

        let newVal = current + n;
        let num = parseInt(newVal);

        if (num > 20) {
            alert("Score must be between 0 and 20.");
            return;
        }

        scores[currentImage - 1] = newVal;
        updateTopBar();
    }

    function clearScore() {
        scores[currentImage - 1] = null;
        updateTopBar();
    }

    function goBack() {
        if (currentImage === 1) {
            alert("Already at the first image.");
            return;
        }
        currentImage--;
        updateTopBar();
    }

    function saveAndNext() {
        if (currentImage === totalImages) {
            alert("This is the last image.");
            return;
        }
        currentImage++;
        updateTopBar();
    }

    function submitVotes() {
        const tbody = document.querySelector("#summaryTable tbody");
        tbody.innerHTML = "";

        for (let i = 0; i < totalImages; i++) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${i + 1}</td><td>${scores[i] === null ? "–" : scores[i]}</td>`;
            tbody.appendChild(tr);
        }

        document.getElementById('app').style.display = 'none';
        document.getElementById('summary').style.display = 'block';
        document.body.style.overflow = 'auto';
    }

    updateTopBar();
</script>

</body>
</html>
