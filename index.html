<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutineers Score Pad</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f4;
    }
    .container {
        text-align: center;
        width: 320px;
    }
    .display {
        width: 100%;
        height: 60px;
        font-size: 2rem;
        text-align: right;
        padding: 10px;
        margin-bottom: 10px;
        background: white;
        border: 2px solid #333;
        border-radius: 5px;
    }
    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    button {
        padding: 20px;
        font-size: 1.5rem;
        border: none;
        border-radius: 5px;
        background-color: #ddd;
        cursor: pointer;
    }
    button:active {
        background-color: #bbb;
    }
    .clear {
        background-color: #ff6666;
        color: white;
    }
    .logo-cell {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: none;
    }
    .logo-cell img {
        width: 80px;
        height: auto;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="container">
    <input type="text" id="display" class="display" readonly>

    <div class="keypad">

        <!-- Row 1 -->
        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>

        <!-- Row 2 -->
        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>

        <!-- Row 3 -->
        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>

        <!-- Row 4 (fixed positions) -->
        <button class="clear" onclick="clearDisplay()" style="grid-column: 1;">Clear</button>

        <button onclick="press(0)" style="grid-column: 2;">0</button>

        <div class="logo-cell" style="grid-column: 3;">
            <img src="https://raw.githubusercontent.com/TheMutineers/mutineers-judging/main/pngkey.com-ship-silhouette-png-4146604.png">
        </div>

    </div>
</div>

<script>
function press(num) {
    document.getElementById("display").value += num;
}
function clearDisplay() {
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
