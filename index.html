<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Prevent scrolling */
        font-family: Arial, sans-serif;
        text-align: center;
    }

    /* Full‑screen layout */
    #app {
        height: 100vh;              /* EXACT phone height */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 8px;
        box-sizing: border-box;
    }

    /* Title */
    h1 {
        margin: 0;
        font-size: 2.6em;
        color: #990000;
        font-weight: bold;
    }

    /* Submit button */
    #submitButton {
        background: #990000;
        color: white;
        border: none;
        width: 100%;
        height: 10vh;
        font-size: 2em;
        border-radius: 12px;
    }

    /* Top bar */
    #topBar {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
    }

    .infoBox {
        border: 2px solid #999;
        border-radius: 8px;
        width: 48%;
        height: 8vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8em;
        font-weight: bold;
    }

    #imageNumber { color: #008000; }
    #scoreDisplay { color: #cc5500; }

    /* Keypad grid */
    #keypad {
        flex-grow: 1;               /* Take remaining space */
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: 1fr;
        gap: 6px;
        margin-top: 6px;
    }

    .keyBtn {
        font-size: 2.4em;
        border-radius: 12px;
        background: #e0e0e0;
        border: 2px solid #999;
    }

    /* Navigation buttons */
    #navRow {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        height: 10vh;
    }

    .navBtn {
        width: 50%;
        font-size: 2em;
        border-radius: 12px;
        background: #d0d0d0;
        border: 2px solid #777;
    }
</style>
